version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    ports:
      - "8000:8000"
    volumes:
      - ./src:/app/src
    environment:
      - PYTHONUNBUFFERED=1
      - INFLUXDB_TOKEN=my-super-secret-auth-token
    networks:
      - fleet-network

  simulator:
    build:
      context: .
      dockerfile: docker/Dockerfile.simulator
    volumes:
      - ./src:/app/src
    environment:
      - PYTHONUNBUFFERED=1
      - INGEST_URL=http://backend:8000/api/telemetry/ingest
    depends_on:
      - backend
    networks:
      - fleet-network

  frontend-old:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    ports:
      - "5174:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:8000
    networks:
      - fleet-network

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend-new
    ports:
      - "3000:3000"
    volumes:
      - ./frontend-1:/app
      - /app/node_modules
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api
      - NEXT_PUBLIC_WS_URL=ws://localhost:8000/api/ws/
    networks:
      - fleet-network

  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=fleet_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - fleet-network

  influxdb:
    image: influxdb:2.7-alpine
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=admin
      - DOCKER_INFLUXDB_INIT_PASSWORD=adminpassword
      - DOCKER_INFLUXDB_INIT_ORG=fleet_org
      - DOCKER_INFLUXDB_INIT_BUCKET=telemetry
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=my-super-secret-auth-token
    volumes:
      - influxdb_data:/var/lib/influxdb2
    ports:
      - "8086:8086"
    networks:
      - fleet-network

volumes:
  postgres_data:
  influxdb_data:

networks:
  fleet-network:
    driver: bridge
